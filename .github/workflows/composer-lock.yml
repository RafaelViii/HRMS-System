name: Generate composer.lock

on:
  workflow_dispatch:
  push:
    paths:
      - 'composer.json'

jobs:
  build-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql
          coverage: none

      - name: Validate composer.json
        run: |
          composer validate --no-check-publish

      - name: Install dependencies and generate lock
        run: |
          composer update --no-dev --prefer-dist --no-interaction
          test -f composer.lock || (echo "composer.lock was not generated" && exit 1)

      - name: Commit composer.lock if present
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.lock || true
          if ! git diff --cached --quiet; then
            git commit -m "ci: generate composer.lock"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin HEAD:"${{ github.ref_name }}"
          else
            echo "No changes to commit"
          fi

      - name: Upload composer.lock artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-lock
          path: composer.lock
          if-no-files-found: warn
