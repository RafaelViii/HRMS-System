; PHP session hardening — prevents auto-start and enforces secure defaults
; Applied by PHP-FPM/CGI automatically from document root
session.auto_start = 0
session.use_strict_mode = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

; Prevent PHP from exposing its version
expose_php = Off

; Error display — log errors but never show to end users
display_errors = Off
log_errors = On
